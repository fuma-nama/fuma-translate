name: Release

on:
  push:
    branches:
      - dev

concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
          - host: ubuntu-latest
            target: wasm32-wasip1-threads
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.settings.target, 'musl') }}
        uses: taiki-e/install-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Build native binding (musl)
        if: ${{ contains(matrix.settings.target, 'musl') }}
        working-directory: packages/core
        run: pnpm exec napi build --platform --release --target ${{ matrix.settings.target }} -x --output-dir native

      - name: Build native binding
        if: ${{ contains(matrix.settings.target, 'musl') == false }}
        working-directory: packages/core
        run: pnpm exec napi build --platform --release --target ${{ matrix.settings.target }} --output-dir native

      - uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.settings.target }}
          path: packages/core/native/
          if-no-files-found: error

  release:
    name: Release
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          pattern: binding-*
          path: packages/core/native
          merge-multiple: true

      - name: Prepare native packages
        working-directory: packages/core
        run: pnpm run artifacts && pnpm run build:js

      - name: Build remaining packages
        run: pnpm run build --filter=!./packages/core

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
