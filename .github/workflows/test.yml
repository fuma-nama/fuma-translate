name: Unit Tests

on:
  pull_request:
    branches: [main, dev]

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Build native binding
        working-directory: packages/core
        run: pnpm exec napi build --platform --release --esm --js native.js --dts native.d.ts --target ${{ matrix.settings.target }} --output-dir native

      - uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.settings.target }}
          path: packages/core/native/
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm i --frozen-lockfile

      - name: Download Linux binding
        uses: actions/download-artifact@v4
        with:
          name: binding-x86_64-unknown-linux-gnu
          path: packages/core/native

      - name: Build packages
        working-directory: packages/core
        run: pnpm exec napi build --platform --release --esm --js native.js --dts native.d.ts --output-dir native

      - name: Build workspace packages
        run: pnpm run build --filter=./packages/*

      - name: Run Tests
        run: pnpm test
